export default "<ion-header>\n  <ion-toolbar>\n    <ion-buttons slot=\"start\">\n      <ion-back-button defaultHref=\"home\" (click)=\"goToFoodsDatabaseTab()\"></ion-back-button>\n    </ion-buttons>\n    <ion-title>Edit Food</ion-title>\n  </ion-toolbar>\n</ion-header>\n\n<ion-content>\n  <!--(keyup.enter)=\"submitForm()\"-->\n  <div *ngIf=\"isFormReadyToBuild\">\n  <form [formGroup]=\"editForm\" (ngSubmit)=\"submitForm()\" (keyup.enter)=\"submitForm()\" novalidate>\n    <ion-item lines=\"full\">\n      <ion-label position=\"floating\">Name</ion-label>\n      <ion-input formControlName=\"name\" type=\"text\"></ion-input>\n    </ion-item>\n\n    <ion-item lines=\"full\">\n      <ion-label position=\"floating\">Calories 🔋</ion-label>\n      <ion-input formControlName=\"calories\"type=\"text\" inputmode=\"numeric\" autofocus></ion-input>\n    </ion-item>\n\n    <ion-item lines=\"full\">\n      <ion-label position=\"floating\">Fats 🐖</ion-label>\n      <ion-input formControlName=\"fats\" type=\"text\" inputmode=\"numeric\"></ion-input>\n    </ion-item>\n\n    <ion-item lines=\"full\">\n      <ion-label position=\"floating\">Saturated Fats ❌</ion-label>\n      <ion-input formControlName=\"saturated\" type=\"text\" inputmode=\"numeric\"></ion-input>\n    </ion-item>\n\n    <ion-item lines=\"full\">\n      <ion-label position=\"floating\">Carbohydrates 🍞</ion-label>\n      <ion-input formControlName=\"carbohydrates\" type=\"text\" inputmode=\"numeric\"></ion-input>\n    </ion-item>\n\n    <ion-item lines=\"full\">\n      <ion-label position=\"floating\">Protein 🥩</ion-label>\n      <ion-input formControlName=\"protein\" type=\"text\" inputmode=\"numeric\"></ion-input>\n    </ion-item>\n\n    <ion-row>\n      <ion-col>\n        <ion-button type=\"submit\" color=\"danger\" expand=\"block\">Submit</ion-button>\n      </ion-col>\n    </ion-row>\n  </form>\n</div>\n  \n</ion-content>\n";
