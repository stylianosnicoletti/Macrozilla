export default "<ion-header>\n  <ion-toolbar color=\"primary\">\n    <ion-title>Log In</ion-title>\n  </ion-toolbar>\n</ion-header>\n\n<ion-content class=\"form-content\">\n  <form class=\"form\" [formGroup]=\"validations_form\" (ngSubmit)=\"tryLogin(validations_form.value)\"\n    (keyup.enter)=\"tryLogin(validations_form.value)\">\n    <ion-item>\n      <ion-label position=\"floating\" color=\"primary\">Email</ion-label>\n      <ion-input type=\"text\" formControlName=\"email\"></ion-input>\n    </ion-item>\n    <div class=\"validation-errors\">\n      <ng-container *ngFor=\"let validation of validation_messages.email\">\n        <div class=\"error-message-email\"\n          *ngIf=\"validations_form.get('email').hasError(validation.type) && (validations_form.get('email').dirty || validations_form.get('email').touched)\">\n          {{ validation.message }}\n        </div>\n      </ng-container>\n    </div>\n    <ion-item>\n      <ion-label position=\"floating\" color=\"primary\">Password</ion-label>\n      <ion-input type=\"password\" formControlName=\"password\"></ion-input>\n    </ion-item>\n    <div class=\"validation-errors\">\n      <ng-container *ngFor=\"let validation of validation_messages.password\">\n        <div class=\"error-message-password\"\n          *ngIf=\"validations_form.get('password').hasError(validation.type) && (validations_form.get('password').dirty || validations_form.get('password').touched)\">\n          {{ validation.message }}\n        </div>\n      </ng-container>\n    </div>\n    <ion-button class=\"email-log-in-button\" expand=\"block\" type=\"submit\" [disabled]=\"!validations_form.valid\">Log In\n    </ion-button>\n\n    <p class=\"go-to-forgot-password\">\n      Forgot you password? <a (click)=\"goResetPasswordPage()\">Recover it.</a>\n    </p>\n    <!--  <ion-button class=\"google-log-in-button\" color=\"danger\" expand=\"block\" (click)=\"presentToast('Currently not available')\">\n        LOG IN WITH GOOGLE\n    </ion-button>-->\n    <ion-button class=\"register-button\" color=\"success\" expand=\"block\" (click)=\"goRegisterPage()\">\n      REGISTER\n    </ion-button>\n    <label class=\"error-message-login\">{{errorMessage}}</label>\n  </form>\n\n</ion-content>";
