export default "  <!--<ion-toolbar>\n  <ion-buttons slot=\"primary\">\n  <ion-button (click)=\"presentPopover($event)\">\n      <ion-icon slot=\"icon-only\" ios=\"ellipsis-horizontal\" md=\"ellipsis-vertical\"></ion-icon>\n    </ion-button>\n  </ion-buttons>\n</ion-toolbar>\n-->\n<ion-content padding>\n  <ion-grid>\n    <ion-row>\n      <ion-col col-3></ion-col>\n      <ion-col col-6 style=\"text-align: center;\">\n        <img style=\"text-align: center;\" expand=\"block\" src=\"assets/avatar.png\" button>\n      </ion-col>\n      <ion-col col-3></ion-col>\n    </ion-row>\n  </ion-grid>\n  <ion-card>\n    <ion-card-header>\n      <ion-card-subtitle>Name</ion-card-subtitle>\n      <ion-card-title>\n        <ion-row>\n          <ion-col>\n            {{userName}}\n          </ion-col>\n          <ion-col style=\"text-align: end;\">\n            <ion-icon name=\"create-outline\" button></ion-icon>\n          </ion-col>\n        </ion-row>\n      </ion-card-title>\n      <ion-card-subtitle>Email</ion-card-subtitle>\n      <ion-card-title>{{emailAddress}}</ion-card-title>\n    </ion-card-header>\n  </ion-card>\n  <ion-button class=\"button\" color=\"danger\" expand=\"block\" (click)=\"logout()\">Log out</ion-button>\n</ion-content>";
